name: Replace Template References

on:
  push:
    branches: 
      - main
      - master

jobs:
  replace-template:
    name: Replace Template References
    if: github.repository != 'simon-boyer/template-go'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Replace template references
        run: |
          REPO_NAME=$(echo $GITHUB_REPOSITORY | cut -d '/' -f 2)
          echo "Replacing all instances of 'template-go' with '$REPO_NAME'"
          # Find all files and replace
          find . -type f ! -path './.git/*' -print0 | xargs -0 sed -i "s|template-go|$REPO_NAME|g"
          mv cmd/template-go cmd/$REPO_NAME

      - name: Delete init workflow
        run: rm .github/workflows/init.yml

      - name: Enable workflow
        run: mv .github/workflows/ci.yml.disabled .github/workflows/ci.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Replace template references with current repo" || echo "No changes to commit"
          git push

